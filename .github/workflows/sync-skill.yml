# Reusable workflow: source repos call this on tag push to publish their
# skill into shhac/agent-skills. Mirrors the homebrew-tap release pattern —
# the caller holds a deploy key (SKILLS_DEPLOY_KEY) with write access here.
#
# Caller snippet (see docs/publishing.md):
#
#   on:
#     push:
#       tags: ['v*', 'skill-v*']
#   jobs:
#     publish-skill:
#       uses: shhac/agent-skills/.github/workflows/sync-skill.yml@main
#       with:
#         skill_name: agent-notion
#       secrets:
#         SKILLS_DEPLOY_KEY: ${{ secrets.SKILLS_DEPLOY_KEY }}
name: Sync skill

on:
  workflow_call:
    inputs:
      skill_name:
        description: Skill folder name (e.g. agent-notion)
        required: true
        type: string
      skill_path:
        description: Path to the skill folder in the source repo (default skills/<skill_name>)
        required: false
        type: string
        default: ""
    secrets:
      SKILLS_DEPLOY_KEY:
        description: Deploy key with write access to shhac/agent-skills
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source repo (the caller, at the pushed tag)
        uses: actions/checkout@v5
        with:
          path: source

      - name: Check out agent-skills
        uses: actions/checkout@v5
        with:
          repository: shhac/agent-skills
          ssh-key: ${{ secrets.SKILLS_DEPLOY_KEY }}
          path: agent-skills

      # Sync + commit + push in one retry loop. Derived files (manifest, the
      # README table, plugin.json, marketplace.json) are regenerated from
      # scratch, so a concurrent release's changes to them can't be rebase-
      # merged. Instead, on each attempt reset to the latest main and re-apply
      # the sync on top — the script is idempotent, so this always converges.
      - name: Sync, commit, and push
        working-directory: agent-skills
        env:
          SKILL_NAME: ${{ inputs.skill_name }}
          SKILL_PATH: ${{ inputs.skill_path }}
          SRC_REPO: ${{ github.repository }}
          SRC_TAG: ${{ github.ref_name }}
          SRC_COMMIT: ${{ github.sha }}
        run: |
          export SRC_DIR="$GITHUB_WORKSPACE/source/${SKILL_PATH:-skills/$SKILL_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          short_sha="$(echo "$SRC_COMMIT" | cut -c1-7)"
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            ./scripts/sync-skill.sh
            git add -A
            if git diff --cached --quiet; then
              echo "no changes to publish"
              exit 0
            fi
            git commit -m "sync($SKILL_NAME): $SRC_REPO@$SRC_TAG ($short_sha)"
            if git push; then
              exit 0
            fi
            echo "push raced with another release; re-syncing onto new main (attempt $attempt)"
          done
          echo "failed to push after 5 attempts" >&2
          exit 1
